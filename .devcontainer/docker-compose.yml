version: "3"
services:
  dev:
    build:
      context: ./
      dockerfile: Dockerfile
      args:
        # 
        "--target": "develop"
        # For Linux, Change the permission by specifying UID / GID.
        "USER_UID": ${VSCODE_UID:-2001}
        "USER_GID": ${VSCODE_GID:-2001}
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker-host.sock 
      - ..:/workspaces
    working_dir: /workspaces
